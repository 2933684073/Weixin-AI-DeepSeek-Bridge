<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepSeek 微信 AI 桥接</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --ink: #17202a;
        --muted: #607080;
        --line: #d9e0e8;
        --user: #0f766e;
        --assistant: #1f4b99;
        --danger: #9f1239;
        --focus: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .app {
        display: grid;
        grid-template-rows: 56px minmax(0, 1fr) auto;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 20px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .status {
        min-width: 72px;
        color: var(--muted);
        font-size: 13px;
        text-align: right;
      }

      main {
        overflow-y: auto;
        padding: 24px min(5vw, 48px);
      }

      .thread {
        display: flex;
        flex-direction: column;
        gap: 14px;
        max-width: 920px;
        margin: 0 auto;
      }

      .message {
        display: grid;
        gap: 6px;
        max-width: min(760px, 92%);
      }

      .message.user {
        align-self: flex-end;
      }

      .message.assistant {
        align-self: flex-start;
      }

      .role {
        color: var(--muted);
        font-size: 12px;
      }

      .bubble {
        width: fit-content;
        max-width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        background: var(--panel);
        line-height: 1.6;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .user .bubble {
        border-color: color-mix(in srgb, var(--user) 28%, var(--line));
      }

      .assistant .bubble {
        border-color: color-mix(in srgb, var(--assistant) 25%, var(--line));
      }

      .composer {
        border-top: 1px solid var(--line);
        background: var(--panel);
      }

      form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px;
        gap: 10px;
        width: min(920px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 14px 0 18px;
      }

      textarea,
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
      }

      textarea {
        min-height: 48px;
        max-height: 180px;
        resize: vertical;
        padding: 12px;
      }

      input {
        height: 38px;
        padding: 0 10px;
      }

      button {
        min-height: 48px;
        border: 0;
        border-radius: 8px;
        background: var(--focus);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .token {
        display: none;
        grid-column: 1 / -1;
      }

      .token.show {
        display: block;
      }

      .error {
        color: var(--danger);
      }

      @media (max-width: 640px) {
        header {
          padding: 0 14px;
        }

        main {
          padding: 18px 12px;
        }

        form {
          grid-template-columns: 1fr;
          width: calc(100vw - 24px);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>DeepSeek 微信 AI 桥接</h1>
        <div class="status" id="status">连接中</div>
      </header>
      <main id="main">
        <section class="thread" id="thread"></section>
      </main>
      <div class="composer">
        <form id="form">
          <input
            class="token"
            id="token"
            name="token"
            autocomplete="off"
            placeholder="OPENCLAW_PROXY_KEY"
          />
          <textarea id="message" name="message" autocomplete="off" placeholder="输入消息"></textarea>
          <button id="send" type="submit">发送</button>
        </form>
      </div>
    </div>

    <script>
      const state = {
        conversationId: localStorage.getItem('conversationId') || '',
        token: localStorage.getItem('proxyToken') || ''
      };
      const form = document.querySelector('#form');
      const thread = document.querySelector('#thread');
      const statusNode = document.querySelector('#status');
      const messageNode = document.querySelector('#message');
      const sendNode = document.querySelector('#send');
      const tokenNode = document.querySelector('#token');
      const mainNode = document.querySelector('#main');

      tokenNode.value = state.token;

      function setStatus(text, isError = false) {
        statusNode.textContent = text;
        statusNode.className = isError ? 'status error' : 'status';
      }

      function append(role, text) {
        const item = document.createElement('article');
        item.className = `message ${role}`;
        item.innerHTML = `<div class="role">${role === 'user' ? '你' : 'AI'}</div><div class="bubble"></div>`;
        item.querySelector('.bubble').textContent = text;
        thread.appendChild(item);
        mainNode.scrollTop = mainNode.scrollHeight;
      }

      async function postChat(message) {
        const headers = {
          'Content-Type': 'application/json'
        };

        if (state.token) {
          headers.Authorization = `Bearer ${state.token}`;
        }

        const response = await fetch('/chat', {
          method: 'POST',
          headers,
          body: JSON.stringify({
            message,
            conversationId: state.conversationId
          })
        });

        if (response.status === 401) {
          tokenNode.classList.add('show');
          throw new Error('需要 OPENCLAW_PROXY_KEY');
        }

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error && data.error.message ? data.error.message : '请求失败');
        }

        return data;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const message = messageNode.value.trim();
        if (!message) {
          return;
        }

        state.token = tokenNode.value.trim();
        localStorage.setItem('proxyToken', state.token);
        messageNode.value = '';
        sendNode.disabled = true;
        append('user', message);
        setStatus('回复中');

        try {
          const data = await postChat(message);
          state.conversationId = data.conversationId;
          localStorage.setItem('conversationId', state.conversationId);
          append('assistant', data.reply);
          setStatus('在线');
        } catch (error) {
          append('assistant', error.message);
          setStatus('异常', true);
        } finally {
          sendNode.disabled = false;
          messageNode.focus();
        }
      });

      fetch('/health')
        .then((response) => response.json())
        .then((data) => {
          setStatus(data.ok ? '在线' : '异常', !data.ok);
          if (data.auth && !state.token) {
            tokenNode.classList.add('show');
          }
        })
        .catch(() => setStatus('异常', true));
    </script>
  </body>
</html>
